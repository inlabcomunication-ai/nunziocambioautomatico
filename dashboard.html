<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Dashboard Contatti · PN Autofficina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --orange: #C44417;
  --orange-hover: #A8390F;
  --anthracite: #2B2B2B;
  --anthracite-soft: #353535;
  --anthracite-deep: #1F1F1F;
  --white: #FFFFFF;
  --gray-light: #F5F5F5;
  --gray-mid: #E5E5E5;
  --gray-text: #4A4A4A;
  --gray-soft: #6E6E6E;
  --border-dark: #404040;
  --border-light: #DFDFDF;
  --status-nuovo: #C44417;
  --status-contattato: #B07A00;
  --status-chiuso: #4A7A4A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--anthracite-deep);
  color: var(--white);
  font-family: 'Open Sans', system-ui, sans-serif;
  font-weight: 400;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.heading {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  letter-spacing: -0.01em;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ============ LOGIN ============ */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-card {
  background: var(--anthracite);
  border: 1px solid var(--border-dark);
  padding: 40px;
  width: 100%;
  max-width: 420px;
}
.login-logo {
  display: block;
  height: 72px;
  width: auto;
  margin: 0 auto 28px;
}
.login-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 22px;
  text-align: center;
  margin-bottom: 6px;
}
.login-sub {
  text-align: center;
  font-size: 13px;
  color: var(--gray-soft);
  margin-bottom: 28px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-soft);
  margin-bottom: 8px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--anthracite-deep);
  border: 1px solid var(--border-dark);
  color: var(--white);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--orange);
}
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px 18px;
  background: var(--orange);
  color: var(--white);
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.15s;
}
.btn-primary:hover:not(:disabled) { background: var(--orange-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error {
  margin-top: 14px;
  padding: 10px 14px;
  background: rgba(196, 68, 23, 0.12);
  border-left: 3px solid var(--orange);
  font-size: 13px;
  color: #FFB8A3;
  display: none;
}
.login-error.show { display: block; }

/* ============ APP SHELL ============ */
.app { display: none; }
.app.active { display: block; }

.topbar {
  background: var(--anthracite);
  border-bottom: 1px solid var(--border-dark);
  padding: 14px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 18px; }
.topbar-logo { height: 44px; width: auto; display: block; }
.topbar-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.topbar-title .accent { color: var(--orange); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-email {
  font-size: 12px;
  color: var(--gray-soft);
  font-family: 'Montserrat', sans-serif;
}
.btn-ghost {
  padding: 8px 14px;
  background: transparent;
  border: 1px solid var(--border-dark);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.15s;
}
.btn-ghost:hover { background: var(--anthracite-soft); }

/* ============ STATS BAR ============ */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border-dark);
  border-bottom: 1px solid var(--border-dark);
}
.stat-cell {
  background: var(--anthracite);
  padding: 22px 26px;
}
.stat-lbl {
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gray-soft);
  margin-bottom: 6px;
}
.stat-num {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 30px;
  line-height: 1;
}
.stat-num.accent { color: var(--orange); }
.stat-num.warn { color: var(--status-contattato); }
.stat-num.ok { color: var(--status-chiuso); }
@media (max-width: 720px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
}

/* ============ TOOLBAR FILTRI ============ */
.toolbar {
  background: var(--anthracite);
  padding: 16px 28px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border-dark);
}
.toolbar-search {
  flex: 1;
  min-width: 240px;
  position: relative;
}
.toolbar-search input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--anthracite-deep);
  border: 1px solid var(--border-dark);
  color: var(--white);
  font-size: 13px;
  outline: none;
}
.toolbar-search input:focus { border-color: var(--orange); }
.toolbar-search::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236E6E6E' stroke-width='2'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
  background-repeat: no-repeat;
}
.toolbar select {
  padding: 10px 14px;
  background: var(--anthracite-deep);
  border: 1px solid var(--border-dark);
  color: var(--white);
  font-size: 13px;
  outline: none;
  cursor: pointer;
}
.toolbar select:focus { border-color: var(--orange); }
.btn-export {
  padding: 10px 16px;
  background: var(--anthracite-deep);
  border: 1px solid var(--border-dark);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.15s;
}
.btn-export:hover { background: var(--anthracite-soft); }

/* ============ TABLE ============ */
.table-wrap {
  padding: 0 28px 28px;
  background: var(--anthracite-deep);
}
.table-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0 14px;
  font-size: 12px;
  color: var(--gray-soft);
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--anthracite);
  border: 1px solid var(--border-dark);
}
thead th {
  text-align: left;
  padding: 14px 16px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-soft);
  background: var(--anthracite-soft);
  border-bottom: 1px solid var(--border-dark);
  white-space: nowrap;
}
tbody td {
  padding: 14px 16px;
  font-size: 14px;
  border-bottom: 1px solid var(--border-dark);
  vertical-align: top;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--anthracite-soft); }
tbody tr.row-new { border-left: 3px solid var(--orange); }
.col-date { color: var(--gray-soft); font-size: 12px; font-family: 'Montserrat', sans-serif; white-space: nowrap; }
.col-name { font-weight: 600; color: var(--white); }
.col-phone a, .col-email a { color: var(--white); transition: color 0.15s; }
.col-phone a:hover, .col-email a:hover { color: var(--orange); }
.col-plate {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  letter-spacing: 0.05em;
  background: var(--anthracite-deep);
  padding: 4px 8px;
  display: inline-block;
  border: 1px solid var(--border-dark);
  font-size: 12px;
}
.col-notes {
  max-width: 280px;
  font-size: 13px;
  color: var(--gray-mid);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Status select inline */
.status-select {
  padding: 6px 10px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border-dark);
  background: var(--anthracite-deep);
  color: var(--white);
  cursor: pointer;
  outline: none;
  min-width: 130px;
}
.status-select.status-nuovo { background: rgba(196, 68, 23, 0.18); border-color: var(--orange); color: #FFB8A3; }
.status-select.status-contattato { background: rgba(176, 122, 0, 0.18); border-color: var(--status-contattato); color: #F0CB60; }
.status-select.status-chiuso { background: rgba(74, 122, 74, 0.18); border-color: var(--status-chiuso); color: #A5D6A5; }

.btn-delete {
  background: transparent;
  border: none;
  color: var(--gray-soft);
  padding: 4px 8px;
  font-size: 16px;
  transition: color 0.15s;
}
.btn-delete:hover { color: var(--orange); }

.empty-state, .loading-state {
  padding: 60px 24px;
  text-align: center;
  color: var(--gray-soft);
  font-size: 14px;
}
.empty-state strong {
  display: block;
  font-family: 'Montserrat', sans-serif;
  font-size: 18px;
  color: var(--white);
  margin-bottom: 8px;
}

/* Mobile: collapse table to cards */
@media (max-width: 820px) {
  .table-wrap { padding: 0 16px 16px; }
  table, thead, tbody, tr, td, th { display: block; }
  thead { display: none; }
  tbody tr {
    margin-bottom: 12px;
    background: var(--anthracite);
    border: 1px solid var(--border-dark);
    padding: 14px;
  }
  tbody tr.row-new { border-left-width: 3px; }
  tbody tr:hover { background: var(--anthracite); }
  tbody td {
    padding: 6px 0;
    border-bottom: none;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  tbody td::before {
    content: attr(data-label);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-soft);
    flex-shrink: 0;
  }
  .col-notes { max-width: 100%; text-align: right; }
  .topbar { padding: 12px 16px; }
  .stat-cell { padding: 16px; }
  .stat-num { font-size: 22px; }
  .toolbar { padding: 12px 16px; }
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-wrap" id="login-view">
  <div class="login-card">
    <img src="logo.png" alt="PN Autofficina" class="login-logo">
    <div class="login-title">Area Riservata</div>
    <div class="login-sub">Dashboard Contatti</div>

    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Accedi</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app-view">
  <header class="topbar">
    <div class="topbar-left">
      <img src="logo.png" alt="PN Autofficina" class="topbar-logo">
      <div class="topbar-title">Dashboard <span class="accent">Contatti</span></div>
    </div>
    <div class="topbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-ghost" id="logout-btn">Esci</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat-cell">
      <div class="stat-lbl">Totale</div>
      <div class="stat-num" id="stat-total">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Nuovi</div>
      <div class="stat-num accent" id="stat-new">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Contattati</div>
      <div class="stat-num warn" id="stat-contacted">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Chiusi</div>
      <div class="stat-num ok" id="stat-closed">0</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-search">
      <input type="text" id="search-input" placeholder="Cerca per nome, telefono, email, targa, note…">
    </div>
    <select id="filter-status">
      <option value="">Tutti gli stati</option>
      <option value="nuovo">Solo nuovi</option>
      <option value="contattato">Solo contattati</option>
      <option value="chiuso">Solo chiusi</option>
    </select>
    <select id="filter-date">
      <option value="">Qualsiasi data</option>
      <option value="today">Oggi</option>
      <option value="7d">Ultimi 7 giorni</option>
      <option value="30d">Ultimi 30 giorni</option>
    </select>
    <button class="btn-export" id="export-btn">Esporta CSV</button>
  </div>

  <div class="table-wrap">
    <div class="table-meta">
      <span id="results-count">0 risultati</span>
      <span>Aggiornamento in tempo reale</span>
    </div>

    <div id="loading-state" class="loading-state">Caricamento…</div>
    <div id="empty-state" class="empty-state" style="display:none;">
      <strong>Nessun contatto</strong>
      Quando qualcuno compila il form sulla landing apparirà qui.
    </div>

    <table id="leads-table" style="display:none;">
      <thead>
        <tr>
          <th>Data</th>
          <th>Nome</th>
          <th>Telefono</th>
          <th>Email</th>
          <th>Targa</th>
          <th>Note</th>
          <th>Stato</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leads-tbody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, orderBy, onSnapshot,
  doc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ⚠️ Usa la stessa config del file index.html
const firebaseConfig = {
  apiKey: "INSERISCI_API_KEY",
  authDomain: "INSERISCI_PROJECT_ID.firebaseapp.com",
  projectId: "INSERISCI_PROJECT_ID",
  storageBucket: "INSERISCI_PROJECT_ID.appspot.com",
  messagingSenderId: "INSERISCI_SENDER_ID",
  appId: "INSERISCI_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginView = document.getElementById('login-view');
const appView = document.getElementById('app-view');
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');
const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const userEmail = document.getElementById('user-email');

// ========= AUTH =========
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginView.style.display = 'none';
    appView.classList.add('active');
    userEmail.textContent = user.email;
    subscribeLeads();
  } else {
    loginView.style.display = 'flex';
    appView.classList.remove('active');
    if (unsub) unsub();
  }
});

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.classList.remove('show');
  loginBtn.disabled = true;
  loginBtn.textContent = 'Accesso…';
  try {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    console.error(err);
    let msg = "Credenziali non valide.";
    if (err.code === 'auth/too-many-requests') msg = "Troppi tentativi. Riprova più tardi.";
    if (err.code === 'auth/network-request-failed') msg = "Errore di rete. Controlla la connessione.";
    loginError.textContent = msg;
    loginError.classList.add('show');
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'Accedi';
  }
});

logoutBtn.addEventListener('click', () => signOut(auth));

// ========= LEADS =========
let allLeads = [];
let unsub = null;

const tbody = document.getElementById('leads-tbody');
const table = document.getElementById('leads-table');
const loadingState = document.getElementById('loading-state');
const emptyState = document.getElementById('empty-state');
const resultsCount = document.getElementById('results-count');
const searchInput = document.getElementById('search-input');
const filterStatus = document.getElementById('filter-status');
const filterDate = document.getElementById('filter-date');

function subscribeLeads() {
  const q = query(collection(db, 'leads'), orderBy('createdAt', 'desc'));
  unsub = onSnapshot(q, (snap) => {
    allLeads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    loadingState.style.display = 'none';
    render();
  }, (err) => {
    console.error('Errore Firestore:', err);
    loadingState.textContent = 'Errore caricamento. Controlla console.';
  });
}

function formatDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' })
    + ' · ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function applyFilters(leads) {
  const search = searchInput.value.trim().toLowerCase();
  const status = filterStatus.value;
  const dateRange = filterDate.value;
  const now = new Date();
  return leads.filter(l => {
    if (status && l.status !== status) return false;
    if (dateRange && l.createdAt) {
      const d = l.createdAt.toDate ? l.createdAt.toDate() : new Date(l.createdAt);
      const diff = now - d;
      if (dateRange === 'today') {
        if (d.toDateString() !== now.toDateString()) return false;
      } else if (dateRange === '7d') {
        if (diff > 7 * 24 * 3600 * 1000) return false;
      } else if (dateRange === '30d') {
        if (diff > 30 * 24 * 3600 * 1000) return false;
      }
    }
    if (search) {
      const haystack = [
        l.name, l.phone, l.email, l.plate, l.notes
      ].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
}

function render() {
  // stats sempre sul totale, non sui filtrati
  document.getElementById('stat-total').textContent = allLeads.length;
  document.getElementById('stat-new').textContent =
    allLeads.filter(l => l.status === 'nuovo').length;
  document.getElementById('stat-contacted').textContent =
    allLeads.filter(l => l.status === 'contattato').length;
  document.getElementById('stat-closed').textContent =
    allLeads.filter(l => l.status === 'chiuso').length;

  const filtered = applyFilters(allLeads);
  resultsCount.textContent =
    filtered.length === 1 ? '1 risultato' : `${filtered.length} risultati`;

  tbody.innerHTML = '';
  if (allLeads.length === 0) {
    emptyState.style.display = 'block';
    table.style.display = 'none';
    return;
  }
  emptyState.style.display = 'none';
  table.style.display = 'table';

  for (const l of filtered) {
    const tr = document.createElement('tr');
    if (l.status === 'nuovo') tr.className = 'row-new';
    tr.innerHTML = `
      <td data-label="Data" class="col-date">${formatDate(l.createdAt)}</td>
      <td data-label="Nome" class="col-name">${escapeHtml(l.name || '—')}</td>
      <td data-label="Telefono" class="col-phone">${
        l.phone ? `<a href="tel:${escapeAttr(l.phone)}">${escapeHtml(l.phone)}</a>` : '—'
      }</td>
      <td data-label="Email" class="col-email">${
        l.email ? `<a href="mailto:${escapeAttr(l.email)}">${escapeHtml(l.email)}</a>` : '—'
      }</td>
      <td data-label="Targa">${l.plate ? `<span class="col-plate">${escapeHtml(l.plate)}</span>` : '—'}</td>
      <td data-label="Note" class="col-notes">${escapeHtml(l.notes || '—')}</td>
      <td data-label="Stato">
        <select class="status-select status-${l.status || 'nuovo'}" data-id="${l.id}">
          <option value="nuovo" ${l.status === 'nuovo' ? 'selected' : ''}>Nuovo</option>
          <option value="contattato" ${l.status === 'contattato' ? 'selected' : ''}>Contattato</option>
          <option value="chiuso" ${l.status === 'chiuso' ? 'selected' : ''}>Chiuso</option>
        </select>
      </td>
      <td data-label="Azioni">
        <button class="btn-delete" data-id="${l.id}" title="Elimina">✕</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

// Event delegation per status change e delete
tbody.addEventListener('change', async (e) => {
  if (!e.target.classList.contains('status-select')) return;
  const id = e.target.dataset.id;
  const newStatus = e.target.value;
  e.target.className = `status-select status-${newStatus}`;
  try {
    await updateDoc(doc(db, 'leads', id), { status: newStatus });
  } catch (err) {
    console.error(err);
    alert('Errore aggiornamento stato.');
  }
});

tbody.addEventListener('click', async (e) => {
  if (!e.target.classList.contains('btn-delete')) return;
  const id = e.target.dataset.id;
  if (!confirm('Eliminare questo contatto? L\'azione è irreversibile.')) return;
  try {
    await deleteDoc(doc(db, 'leads', id));
  } catch (err) {
    console.error(err);
    alert('Errore eliminazione.');
  }
});

// Filtri
searchInput.addEventListener('input', render);
filterStatus.addEventListener('change', render);
filterDate.addEventListener('change', render);

// Export CSV
document.getElementById('export-btn').addEventListener('click', () => {
  const filtered = applyFilters(allLeads);
  if (filtered.length === 0) { alert('Nessun contatto da esportare.'); return; }
  const headers = ['Data', 'Nome', 'Telefono', 'Email', 'Targa', 'Note', 'Stato'];
  const rows = filtered.map(l => [
    formatDate(l.createdAt),
    l.name || '',
    l.phone || '',
    l.email || '',
    l.plate || '',
    (l.notes || '').replace(/\n/g, ' '),
    l.status || 'nuovo'
  ]);
  const csv = [headers, ...rows]
    .map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `contatti-pn-autofficina-${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// Helpers
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(str) {
  return String(str).replace(/["'<>&]/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
</script>
